apiVersion: batch/v1
kind: CronJob
metadata:
  name: scale-down-cronjob
  namespace: default
spec:
  schedule: "0 22 * * *"  # 10 PM IST
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: kubectl
            image: bitnami/kubectl
            command:
            - /bin/sh
            - -c
            - |
              kubectl scale deployment shilamurti-deploy --replicas=0 -n shilamurti-frontend
              kubectl scale deployment shilamurti-deploy-backend --replicas=0 -n shilamurti-backend
          restartPolicy: OnFailure
