name: MEDUSA BACKEND CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/storefront-cicd.yaml'

permissions:
  contents: read

env:
  DOCKERHUB_REPO: cr996/medusa-backend
  DO_APP_ID: 6aff8bbc-b444-4348-b98f-9676d81306cd

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}
          build-args: |
            BACKEND_ENV_FILE_CONTENTS=${{ secrets.BACKEND_ENV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger DigitalOcean App Deployment
        run: |
          curl -s -X POST \
            "https://api.digitalocean.com/v2/apps/${{ env.DO_APP_ID }}/deployments" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"force_build": false}'
