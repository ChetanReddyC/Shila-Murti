name: STOREFRONT SHILAMURTI CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'storefront/**'
      - '.github/workflows/shilamurti-frontend.yaml'

permissions:
  contents: read

env:
  DOCKERHUB_REPO: cr996/shilamurti-storefront
  DO_APP_ID: 1febe873-c572-422f-b574-f5b2f45fc57a

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create env file
        run: printf '%s' "$FRONTEND_ENV" > ./storefront/.env
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          file: ./storefront/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger DigitalOcean App Deployment
        run: |
          curl -s -X POST \
            "https://api.digitalocean.com/v2/apps/${{ env.DO_APP_ID }}/deployments" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"force_build": false}'
